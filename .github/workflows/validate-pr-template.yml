name: Validate PR Template

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const requiredSnippets = [
              "<!-- isango-pr-template:v1 -->",
              "## Summary",
              "## Linked Issue",
              "## What Changed",
              "## Visual Evidence",
              "## Test Evidence",
              "## Route and State Impact",
              "## Checklist",
              "## Out of Scope",
            ];

            const missing = requiredSnippets.filter((snippet) => !body.includes(snippet));
            const linkedIssuePattern = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+|#\d+|https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+/i;
            const hasLinkedIssue = linkedIssuePattern.test(body);

            if (missing.length > 0 || !hasLinkedIssue) {
              const errors = [];
              if (missing.length > 0) {
                errors.push(`Missing template sections or marker: ${missing.join(", ")}`);
              }
              if (!hasLinkedIssue) {
                errors.push("Missing linked issue reference in the `## Linked Issue` section.");
              }

              core.setFailed(errors.join("\n"));
            }
